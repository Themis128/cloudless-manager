name: Deploy to Pi

# Runs entirely on GitHub-hosted runners — no self-hosted runner on the Pi.
#   build  → ubuntu-24.04-arm (native arm64 image for the Pi cluster)
#   deploy → ubuntu-latest, joins the tailnet and runs kubectl over Tailscale
#            against the k3s API (omv-main = 100.113.41.119:6443).

on:
  push:
    branches: [main]
    paths:
      - "server.js"
      - "package.json"
      - "Dockerfile"
      - "public/**"
      - "k8s/deployment.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed to push to GHCR

concurrency:
  group: deploy-cloudless-manager
  cancel-in-progress: true

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push arm64 image to GHCR
        # Tag with the commit SHA (immutable, for pinned/reproducible deploys)
        # plus :latest (convenience). The deploy job pins the SHA tag.
        run: |
          IMAGE="ghcr.io/themis128/cloudless-manager"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    name: Roll out on k3s
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifest & roll out
        run: |
          # Apply the manifest (picks up any deployment.yaml changes), then pin
          # the exact SHA-tagged image — reproducible deploys, precise rollback.
          kubectl apply -f k8s/deployment.yaml
          kubectl -n cloudless set image deployment/cloudless-manager \
            cloudless-manager=ghcr.io/themis128/cloudless-manager:${{ github.sha }}
          kubectl -n cloudless rollout status deployment/cloudless-manager --timeout=300s

      - name: Show pod placement
        run: kubectl -n cloudless get pods -l app=cloudless-manager -o wide

      - name: Verify HTTP
        run: |
          sleep 10
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 https://manage.cloudless.online/ || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::warning::manage.cloudless.online returned $STATUS"
          fi
