name: Deploy to Pi

on:
  push:
    branches: [main]
    paths:
      - "server.js"
      - "package.json"
      - "Dockerfile"
      - "public/**"
      - "k8s/deployment.yaml"

  workflow_dispatch:
    inputs:
      skip_sync:
        description: "Skip file sync (restart only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:
  deploy:
    name: Build & rollout
    runs-on: [self-hosted, omv]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Sync source files to working directory
        if: ${{ github.event.inputs.skip_sync != 'true' }}
        run: |
          DEST="/home/tbaltzakis/cloudless-manager"
          mkdir -p "$DEST/public/icons" "$DEST/k8s"

          for f in server.js package.json Dockerfile \
                   public/index.html public/manifest.json public/sw.js \
                   public/icons/icon.svg public/icons/icon-maskable.svg \
                   k8s/deployment.yaml; do
            if [ -f "$f" ]; then
              cp "$f" "$DEST/$f"
              echo "  OK  $f"
            fi
          done

      - name: Build & push image to GHCR
        run: |
          IMAGE="ghcr.io/themis128/cloudless-manager:latest"
          docker build -t "$IMAGE" /home/tbaltzakis/cloudless-manager
          docker push "$IMAGE"

      - name: Apply deployment manifest
        run: |
          kubectl apply -f /home/tbaltzakis/cloudless-manager/k8s/deployment.yaml

      - name: Rolling restart
        run: |
          kubectl -n cloudless rollout restart deployment/cloudless-manager

      - name: Wait for rollout
        run: |
          # maxSurge:0 + hard anti-affinity = sequential: pod1 ready → evict old2 → pod2 ready
          # Two full pull+start cycles on Pi hardware; 240s is the safe upper bound.
          kubectl -n cloudless rollout status deployment/cloudless-manager --timeout=240s

      - name: Show pod placement
        run: |
          kubectl -n cloudless get pods -l app=cloudless-manager -o wide

      - name: Verify HTTP
        run: |
          sleep 10
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 https://manage.cloudless.online/ || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::warning::manage.cloudless.online returned $STATUS"
          fi
