name: Deploy to Pi

on:
  push:
    branches: [main]
    paths:
      - "server.js"
      - "package.json"
      - "Dockerfile"
      - "public/**"
      - "k8s/deployment.yaml"

  workflow_dispatch:
    inputs:
      skip_sync:
        description: "Skip file sync (restart only)"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy:
    name: Build & rollout
    runs-on: [self-hosted, omv]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to Pi working directory
        if: ${{ github.event.inputs.skip_sync != 'true' }}
        run: |
          DEST="/home/tbaltzakis/cloudless-manager"
          mkdir -p "$DEST/public/icons" "$DEST/k8s"

          for f in server.js package.json Dockerfile \
                   public/index.html public/manifest.json public/sw.js \
                   public/icons/icon.svg public/icons/icon-maskable.svg \
                   k8s/deployment.yaml; do
            if [ -f "$f" ]; then
              cp "$f" "$DEST/$f"
              echo "  OK  $f"
            fi
          done

      - name: Build & rollout
        run: bash /home/tbaltzakis/cloudless-manager/deploy.sh

      - name: Verify HTTP
        run: |
          echo "Waiting 20s for pod to become ready..."
          sleep 20
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            https://manage.cloudless.online/ || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::warning::manage.cloudless.online returned $STATUS — check pod logs"
          fi
