name: Lint & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint + npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in source
        run: |
          # Scan only project source files, never node_modules
          SOURCES="server.js public/index.html public/sw.js"
          FAIL=0
          for f in $SOURCES; do
            [ -f "$f" ] || continue
            if grep -n "AKIA[0-9A-Z]\{16\}" "$f"; then
              echo "::error::Hardcoded AWS key found in $f"
              FAIL=1
            fi
            if grep -n "cfut_[a-zA-Z0-9]\{40\}" "$f"; then
              echo "::error::Hardcoded Cloudflare token found in $f"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "No hardcoded secrets detected in source files."
