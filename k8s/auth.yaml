apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: cloudless
type: Opaque
stringData:
  client-secret: "pCxHcElHv25EqziNwsDWDkbMMS9cy8g9"
  cookie-secret: "2715345b56af82c55938704b76a622b7"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: cloudless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.cloudless.online/realms/master
            - --client-id=cloudless-manager
            - --redirect-url=https://manage.cloudless.online/oauth2/callback
            - --upstream=http://cloudless-manager.cloudless.svc.cluster.local:3000
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_oauth2_proxy_manager
            - --session-store-type=cookie
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - containerPort: 4180
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: cloudless
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
