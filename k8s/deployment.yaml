apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudless-manager
  namespace: cloudless
  labels:
    app: cloudless-manager
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxSurge: 1 / maxUnavailable: 0 — zero-downtime rollout.
      # Single replica on omv (Pi5 8GB); omv-ha (Pi4 1GB) has ~455Mi
      # Kubernetes-allocatable RAM which is insufficient (OOM exit 137, 2026-05-16).
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cloudless-manager
  template:
    metadata:
      labels:
        app: cloudless-manager
    spec:
      serviceAccountName: cloudless-manager
      # Pin to omv (Pi5 8GB). omv-ha (Pi4 1GB) has insufficient RAM:
      # ~455Mi Kubernetes-allocatable after system/kube reservations.
      nodeSelector:
        kubernetes.io/hostname: omv
      containers:
        - name: cloudless-manager
          image: ghcr.io/themis128/cloudless-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_TOKEN
            - name: CF_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_ZONE_ID
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_ACCOUNT_ID
            - name: CF_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_TUNNEL_ID
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudless-manager
  namespace: cloudless
spec:
  selector:
    app: cloudless-manager
  ports:
    - port: 3000
      targetPort: 3000