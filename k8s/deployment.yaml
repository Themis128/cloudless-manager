apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudless-manager
  namespace: cloudless
  labels:
    app: cloudless-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudless-manager
  template:
    metadata:
      labels:
        app: cloudless-manager
    spec:
      serviceAccountName: cloudless-manager
      affinity:
        podAntiAffinity:
          # Prefer spreading across nodes — if only one node is available,
          # both pods can still run there (soft rule, not hard).
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cloudless-manager
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cloudless-manager
          image: ghcr.io/themis128/cloudless-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_TOKEN
            - name: CF_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_ZONE_ID
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_ACCOUNT_ID
            - name: CF_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: CF_TUNNEL_ID
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudless-manager-secrets
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudless-manager
  namespace: cloudless
spec:
  selector:
    app: cloudless-manager
  ports:
    - port: 3000
      targetPort: 3000
