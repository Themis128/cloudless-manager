apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudless-manager
  namespace: cloudless
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudless-manager
rules:
  - apiGroups: [""]
    resources: [nodes, namespaces, pods, pods/log, events, services, endpoints, persistentvolumeclaims]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch, patch]
  - apiGroups: ["metrics.k8s.io"]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudless-manager
subjects:
  - kind: ServiceAccount
    name: cloudless-manager
    namespace: cloudless
roleRef:
  kind: ClusterRole
  name: cloudless-manager
  apiGroup: rbac.authorization.k8s.io
